services:
  postgres:
    image: postgres:16-alpine
    container_name: ig-randevu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TIMEZONE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 10

  booking-api:
    build:
      context: ./booking-api
    container_name: ig-randevu-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://n8n:${POSTGRES_PASSWORD}@postgres:5432/n8n
      TIMEZONE: ${TIMEZONE}
      BUSINESS_NAME: ${BUSINESS_NAME}
      BUSINESS_PHONE: ${BUSINESS_PHONE}
      BUSINESS_EMAIL: ${BUSINESS_EMAIL}
      BUSINESS_WEBSITE: ${BUSINESS_WEBSITE}
      BUSINESS_TAGLINE: ${BUSINESS_TAGLINE}
      DEFAULT_SERVICE_NAME: ${DEFAULT_SERVICE_NAME}
      WORKING_HOURS_START: ${WORKING_HOURS_START}
      WORKING_HOURS_END: ${WORKING_HOURS_END}
      SLOT_DURATION_MINUTES: ${SLOT_DURATION_MINUTES}
      SLOT_BUFFER_MINUTES: ${SLOT_BUFFER_MINUTES}
      APPOINTMENT_LOOKAHEAD_DAYS: ${APPOINTMENT_LOOKAHEAD_DAYS}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL}
      LLM_EXTRACT_TIMEOUT_SECONDS: ${LLM_EXTRACT_TIMEOUT_SECONDS}
      LLM_REPLY_POLISH_TIMEOUT_SECONDS: ${LLM_REPLY_POLISH_TIMEOUT_SECONDS}
      LLM_REPLY_MICRO_MODEL: ${LLM_REPLY_MICRO_MODEL}
      LLM_REPLY_ADVISORY_MODEL: ${LLM_REPLY_ADVISORY_MODEL}
      LLM_REPLY_QUALITY_MODEL: ${LLM_REPLY_QUALITY_MODEL}
      LLM_REPLY_MICRO_TIMEOUT_SECONDS: ${LLM_REPLY_MICRO_TIMEOUT_SECONDS}
      LLM_REPLY_ADVISORY_TIMEOUT_SECONDS: ${LLM_REPLY_ADVISORY_TIMEOUT_SECONDS}
      LLM_REPLY_MICRO_MAX_TOKENS: ${LLM_REPLY_MICRO_MAX_TOKENS}
      LLM_REPLY_ADVISORY_MAX_TOKENS: ${LLM_REPLY_ADVISORY_MAX_TOKENS}
      LLM_REPLY_POLISH_ENABLED: ${LLM_REPLY_POLISH_ENABLED}
      FULL_AI_CONVERSATIONAL_MODE: ${FULL_AI_CONVERSATIONAL_MODE}
      IG_LOGIN_USERNAME: ${IG_LOGIN_USERNAME}
      IG_BUSINESS_USER_ID: ${IG_BUSINESS_USER_ID}
      MORNING_REMINDER_ENABLED: ${MORNING_REMINDER_ENABLED}
      MORNING_REMINDER_WINDOW_START: ${MORNING_REMINDER_WINDOW_START}
      MORNING_REMINDER_WINDOW_END: ${MORNING_REMINDER_WINDOW_END}
      MORNING_REMINDER_CLAIM_TIMEOUT_MINUTES: ${MORNING_REMINDER_CLAIM_TIMEOUT_MINUTES}
      CRM_SYNC_ENABLED: ${CRM_SYNC_ENABLED}
      CRM_SUPABASE_URL: ${CRM_SUPABASE_URL}
      CRM_SUPABASE_ANON_KEY: ${CRM_SUPABASE_ANON_KEY}
      CRM_SUPABASE_EMAIL: ${CRM_SUPABASE_EMAIL}
      CRM_SUPABASE_PASSWORD: ${CRM_SUPABASE_PASSWORD}
      CRM_WORKSPACE_ID: ${CRM_WORKSPACE_ID}
      CRM_SYNC_SOURCE: ${CRM_SYNC_SOURCE}
      CRM_SYNC_TIMEOUT_SECONDS: ${CRM_SYNC_TIMEOUT_SECONDS}
      LIVE_CRM_ENABLED: ${LIVE_CRM_ENABLED}
      LIVE_CRM_SUPABASE_URL: ${LIVE_CRM_SUPABASE_URL}
      LIVE_CRM_SUPABASE_ANON_KEY: ${LIVE_CRM_SUPABASE_ANON_KEY}
      LIVE_CRM_EMAIL: ${LIVE_CRM_EMAIL}
      LIVE_CRM_PASSWORD: ${LIVE_CRM_PASSWORD}
      SERVICES_HINTS: ${SERVICES_HINTS}
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "18000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 10

  instagram-poller:
    build:
      context: ./instagram-poller
    container_name: ig-randevu-poller
    restart: unless-stopped
    depends_on:
      booking-api:
        condition: service_healthy
      n8n:
        condition: service_healthy
    environment:
      IG_LOGIN_USERNAME: ${IG_LOGIN_USERNAME}
      IG_LOGIN_PASSWORD: ${IG_LOGIN_PASSWORD}
      BOOKING_API_BASE_URL: ${BOOKING_API_BASE_URL:-http://booking-api:8000}
      N8N_PROCESS_WEBHOOK_URL: http://n8n:5678/webhook/instagram/ai-router
      REQUEST_TIMEOUT_SECONDS: 90
      IG_POLL_INTERVAL_SECONDS: 1
      IG_THREAD_FETCH_LIMIT: ${IG_THREAD_FETCH_LIMIT}
      IG_MESSAGE_FETCH_LIMIT: ${IG_MESSAGE_FETCH_LIMIT}
      IG_ACTIVE_THREAD_REFRESH_LIMIT: ${IG_ACTIVE_THREAD_REFRESH_LIMIT}
      IG_PENDING_INBOX_ENABLED: ${IG_PENDING_INBOX_ENABLED}
      POLLER_REMINDERS_ENABLED: ${POLLER_REMINDERS_ENABLED}
      VOICE_TRANSCRIPTION_ENABLED: ${VOICE_TRANSCRIPTION_ENABLED}
      VOICE_TRANSCRIPTION_LANGUAGE: ${VOICE_TRANSCRIPTION_LANGUAGE}
      TZ: ${TIMEZONE}
    volumes:
      - ./instagram-poller/data:/app/data

  n8n:
    image: n8nio/n8n:latest
    container_name: ig-randevu-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      booking-api:
        condition: service_healthy
    ports:
      - "5678:5678"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: http://localhost:5678
      WEBHOOK_URL: ${WEBHOOK_TUNNEL_URL:-http://localhost:5678/}
      N8N_PROXY_HOPS: 1
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      GENERIC_TIMEZONE: ${TIMEZONE}
      TZ: ${TIMEZONE}
      BOOKING_API_BASE_URL: ${BOOKING_API_BASE_URL:-http://booking-api:8000}
      META_PAGE_ACCESS_TOKEN: ${META_PAGE_ACCESS_TOKEN}
      META_PAGE_ID: ${META_PAGE_ID}
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN}
      META_GRAPH_VERSION: ${META_GRAPH_VERSION}
      IG_ACCESS_TOKEN: ${IG_ACCESS_TOKEN}
      IG_BUSINESS_USER_ID: ${IG_BUSINESS_USER_ID}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/files/workflows
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5678/healthz"]
      interval: 15s
      timeout: 5s
      retries: 20

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ig-randevu-tunnel
    restart: unless-stopped
    depends_on:
      n8n:
        condition: service_healthy
    command: tunnel --no-autoupdate --url http://n8n:5678

  booking-api-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ig-randevu-api-tunnel
    restart: unless-stopped
    depends_on:
      booking-api:
        condition: service_healthy
    command: tunnel --no-autoupdate --url http://booking-api:8000

volumes:
  postgres_data:
  n8n_data:
